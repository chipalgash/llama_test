language: ru
model_name: meta-llama/Meta-Llama-3-8B-Instruct
train_csv: archive/old_experiments/payloads/ru_csv/train_with_descriptions.csv
eval_csv: archive/old_experiments/payloads/ru_csv/eval_with_descriptions.csv
train_jsonl: data/processed/ru/train_payload.jsonl
eval_jsonl: data/processed/ru/eval_payload.jsonl
metadata_json: data/processed/ru/metadata.json
adapter_dir: adapters/ru_lora_adapter
outputs_dir: outputs/ru
max_train_chunks: 500
max_eval_prompts: 100
qlora:
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  num_epochs: 1
  learning_rate: 0.00001
  batch_size: 1
  gradient_accumulation_steps: 8
  max_seq_length: 1024
  target_modules:
    - q_proj
    - v_proj
